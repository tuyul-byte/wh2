/* Tambahan untuk 7 kolom - perkecil lebar per kolom */

<!-- MAIN APP -->
<div class="app-container" id="appContainer">
    <div class="navbar">
        <h2>📱 Daily Report System</h2>
        <div class="user-info">
            <span class="user-badge" id="userRoleBadge">Operator</span>

<script>
    // ==================== DATA ====================
    const operators = [
        { username: 'darma', password: 'rmd123', name: 'Darma', divisi: 'Raw Material' },
        { username: 'nurhadi', password: 'rmn123', name: 'Nurhadi', divisi: 'Raw Material' },
        { username: 'athar', password: 'fg123', name: 'Athar', divisi: 'Finish Goods' },
        { username: 'purnomo', password: 'sm123', name: 'Purnomo', divisi: 'Save Material' }
    ];
    
    let reports = [];
    let syncQueue = [];
    let currentUser = null;
    let html5QrCode = null;
    let isScanning = false;
    let scanActive = false;
    
    // Hapus data lama jika ada
    function clearOldData() {
        const saved = localStorage.getItem('daily_report_qr_system');
        if (saved) {
            const data = JSON.parse(saved);
            if (data.reports && data.reports.length > 0) {
                if (confirm('Data contoh ditemukan. Hapus semua data lama?')) {
                    localStorage.removeItem('daily_report_qr_system');
                    return true;
                }
            }
        }
        return false;
    }
    
    // Load data
    function loadFromLocal() {
        // Hapus data lama terlebih dahulu
        clearOldData();
        
        const saved = localStorage.getItem('daily_report_qr_system');
        if (saved) {
            const data = JSON.parse(saved);
            reports = data.reports || [];
            syncQueue = data.syncQueue || [];
        } else {
            reports = [];
            syncQueue = [];
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('daily_report_qr_system', JSON.stringify({ reports, syncQueue }));
    }
    
    function calculateTotalJam(mulai, selesai) {
        if (!mulai || !selesai) return '0.0';
        const start = new Date(`2000-01-01T${mulai}`);
        const end = new Date(`2000-01-01T${selesai}`);
        if (isNaN(start) || isNaN(end)) return '0.0';
        const diff = (end - start) / (1000 * 60 * 60);
        return diff > 0 ? diff.toFixed(1) : '0.0';
    }
    
    function isEligibleForQR(report) {
        const totalJam = parseFloat(report.totalJam);
        return report.status === 'Done' && totalJam >= 8.0 && !report.synced;
    }
    
    function generateQRData(report) {
        return JSON.stringify({
            type: 'DAILY_REPORT_SYNC',
            id: report.id,
            operator: report.operator,
            operatorName: report.operatorName,
            divisi: report.divisi,
            tanggal: report.tanggal,
            aktivitas: report.aktivitas,
            totalJam: report.totalJam,
            timestamp: new Date().toISOString()
        });
    }
    
    // ==================== EXPORT XLSX ====================
    function exportAllToExcel() {
        const exportData = reports.map(r => ({
            'ID': r.id,
            'Tanggal': r.tanggal,
            'Operator': r.operatorName,
            'Divisi': r.divisi,
            'Aktivitas': r.aktivitas,
            'Jam Mulai': r.mulai,
            'Jam Selesai': r.selesai,
            'Total Jam': r.totalJam,
            'Status': r.status,
            'Catatan': r.catatan || '',
            'Sync Status': r.synced ? 'Tersync' : 'Belum',
            'Sync Date': r.syncDate ? new Date(r.syncDate).toLocaleString('id') : '-'
        }));
        
        if (exportData.length === 0) {
            alert('Belum ada data laporan!');
            return;
        }
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Daily Report');
        
        const colWidths = [
            {wch:6}, {wch:12}, {wch:15}, {wch:15}, {wch:40}, 
            {wch:10}, {wch:10}, {wch:10}, {wch:10}, {wch:30}, {wch:10}, {wch:20}
        ];
        ws['!cols'] = colWidths;
        
        XLSX.writeFile(wb, `daily_report_all_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    function exportOperatorToExcel(operatorUsername) {
        const operatorData = operators.find(op => op.username === operatorUsername);
        const opReports = reports.filter(r => r.operator === operatorUsername);
        
        if (opReports.length === 0) {
            alert(`Tidak ada data untuk ${operatorData?.name || operatorUsername}`);
            return;
        }
        
        const exportData = opReports.map(r => ({
            'ID': r.id,
            'Tanggal': r.tanggal,
            'Aktivitas': r.aktivitas,
            'Jam Mulai': r.mulai,
            'Jam Selesai': r.selesai,
            'Total Jam': r.totalJam,
            'Status': r.status,
            'Catatan': r.catatan || '',
            'Sync Status': r.synced ? 'Tersync' : 'Belum'
        }));
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `${operatorData?.name || operatorUsername}`);
        
        const colWidths = [{wch:6}, {wch:12}, {wch:50}, {wch:10}, {wch:10}, {wch:10}, {wch:12}, {wch:40}, {wch:12}];
        ws['!cols'] = colWidths;
        
        XLSX.writeFile(wb, `daily_report_${operatorData?.name || operatorUsername}_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    function exportSyncQueueToExcel() {
        if (syncQueue.length === 0) {
            alert('Belum ada data sync queue!');
            return;
        }
        
        const exportData = syncQueue.map(s => ({
            'ID': s.id,
            'Tanggal': s.tanggal,
            'Operator': s.operatorName,
            'Divisi': s.divisi,
            'Aktivitas': s.aktivitas,
            'Total Jam': s.totalJam,
            'Sync Date': new Date(s.syncDate).toLocaleString('id')
        }));
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sync Queue');
        
        XLSX.writeFile(wb, `daily_report_sync_queue_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    // ==================== SCANNER FUNCTIONS ====================
    async function startScanner() {
        if (html5QrCode && isScanning) {
            await stopScanner();
        }
        
        try {
            html5QrCode = new Html5Qrcode("preview");
            
            await html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText) => {
                    handleScanResult(decodedText);
                },
                (errorMessage) => {}
            );
            
            isScanning = true;
            scanActive = true;
            
            const startBtn = document.getElementById('btnStartScan');
            const stopBtn = document.getElementById('btnStopScan');
            const scanResultDiv = document.getElementById('scanResult');
            
            if (startBtn) startBtn.disabled = true;
            if (stopBtn) stopBtn.disabled = false;
            if (scanResultDiv) {
                scanResultDiv.innerHTML = "📷 Scanner aktif - siap scan QR Code";
                scanResultDiv.className = "scan-result info";
            }
            
        } catch (err) {
            const scanResultDiv = document.getElementById('scanResult');
            if (scanResultDiv) {
                scanResultDiv.innerHTML = `❌ Gagal mengakses kamera: ${err.message}`;
                scanResultDiv.className = "scan-result error";
            }
        }
    }
    
    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
                html5QrCode.clear();
            } catch (err) {}
            isScanning = false;
            scanActive = false;
        }
        
        const startBtn = document.getElementById('btnStartScan');
        const stopBtn = document.getElementById('btnStopScan');
        const scanResultDiv = document.getElementById('scanResult');
        
        if (startBtn) startBtn.disabled = false;
        if (stopBtn) stopBtn.disabled = true;
        if (scanResultDiv) {
            scanResultDiv.innerHTML = "⏹️ Scanner dihentikan. Klik 'Start Scanner' untuk memulai.";
            scanResultDiv.className = "scan-result warning";
        }
        
        const previewDiv = document.getElementById('preview');
        if (previewDiv) {
            previewDiv.innerHTML = '';
        }
        
        html5QrCode = null;
    }
    
    function handleScanResult(decodedText) {
        const scanResultDiv = document.getElementById('scanResult');
        
        try {
            const data = JSON.parse(decodedText);
            if (data.type === 'DAILY_REPORT_SYNC') {
                const report = reports.find(r => r.id === data.id);
                
                if (report) {
                    if (report.synced) {
                        if (scanResultDiv) {
                            scanResultDiv.innerHTML = `⚠️ Laporan dari ${data.operatorName} tanggal ${data.tanggal} sudah pernah di-sync!`;
                            scanResultDiv.className = "scan-result error";
                        }
                    } else if (parseFloat(report.totalJam) >= 8.0 && report.status === 'Done') {
                        report.synced = true;
                        report.syncDate = new Date().toISOString();
                        
                        syncQueue.unshift({
                            id: report.id,
                            operator: report.operator,
                            operatorName: report.operatorName,
                            divisi: report.divisi,
                            tanggal: report.tanggal,
                            aktivitas: report.aktivitas,
                            totalJam: report.totalJam,
                            syncDate: report.syncDate
                        });
                        
                        saveToLocal();
                        
                        if (scanResultDiv) {
                            scanResultDiv.innerHTML = `✅ BERHASIL! Laporan ${data.operatorName} - ${data.tanggal} telah di-sync. Total jam: ${data.totalJam} jam`;
                            scanResultDiv.className = "scan-result success";
                        }
                        
                        if (currentUser && currentUser.role === 'admin') {
                            renderAdminPanel();
                            setTimeout(() => {
                                if (scanActive) {
                                    startScanner();
                                }
                            }, 500);
                        }
                    } else {
                        if (scanResultDiv) {
                            scanResultDiv.innerHTML = `❌ GAGAL! Laporan ${data.operatorName} - ${data.tanggal} belum memenuhi syarat (minimal 8 jam dan status Done). Total jam: ${report.totalJam} jam, Status: ${report.status}`;
                            scanResultDiv.className = "scan-result error";
                        }
                    }
                } else {
                    if (scanResultDiv) {
                        scanResultDiv.innerHTML = `❌ QR Code tidak valid! Laporan tidak ditemukan.`;
                        scanResultDiv.className = "scan-result error";
                    }
                }
            } else {
                if (scanResultDiv) {
                    scanResultDiv.innerHTML = `❌ QR Code tidak valid! Bukan laporan daily report.`;
                    scanResultDiv.className = "scan-result error";
                }
            }
        } catch (e) {
            if (scanResultDiv) {
                scanResultDiv.innerHTML = `❌ QR Code tidak dapat dibaca! Format tidak sesuai.`;
                scanResultDiv.className = "scan-result error";
            }
        }
        
        if (navigator.vibrate) navigator.vibrate(200);
    }
    
    // ==================== OPERATOR PANEL ====================
    function renderOperatorPanel() {
        const userReports = reports.filter(r => r.operator === currentUser.username);
        const eligibleReports = userReports.filter(r => isEligibleForQR(r));
        const syncedReports = userReports.filter(r => r.synced === true);
        
        let qrHtml = '';
        if (eligibleReports.length > 0) {
            eligibleReports.forEach(report => {
                const qrId = `qr_${report.id}`;
                qrHtml += `
                    <div class="qr-container" id="qrContainer_${report.id}">
                        <div class="qr-title">📱 QR Code Sync - ${report.tanggal}</div>
                        <div class="qr-status success">
                            ✅ Aktivitas memenuhi syarat! (Total Jam: ${report.totalJam} jam)
                        </div>
                        <div class="qr-code" id="${qrId}"></div>
                        <button class="sync-btn" onclick="markAsSynced(${report.id})">✅ Tandai Sudah Disync</button>
                    </div>
                `;
            });
        } else {
            qrHtml = `
                <div class="qr-container">
                    <div class="qr-title">📱 QR Code Sync</div>
                    <div class="qr-status warning">
                        ⚠️ Belum ada aktivitas dengan durasi minimal 8 jam dan status Done.<br>
                        Silakan lengkapi aktivitas Anda terlebih dahulu.
                    </div>
                </div>
            `;
        }
        
        if (syncedReports.length > 0) {
            qrHtml += `
                <div class="qr-container">
                    <div class="qr-title">✅ Riwayat Sync</div>
                    ${syncedReports.map(r => `
                        <div class="qr-status info" style="margin:5px 0;">
                            📅 ${r.tanggal} - ${r.aktivitas.substring(0,30)} (${r.totalJam} jam) - TERSYNC ✓
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        let tableHtml = `
            <div class="spreadsheet-card">
                <div class="spreadsheet-toolbar">
                    <button class="toolbar-btn" onclick="addRowOperator()">➕ Tambah Baris</button>
                    <button class="toolbar-btn excel" onclick="exportOperatorToExcel('${currentUser.username}')">📎 Export XLSX</button>
                </div>
                <div class="spreadsheet-wrapper">
                    <table class="spreadsheet-table">
                        <thead>
                            <tr><th>Tanggal</th><th>Aktivitas</th><th>Mulai</th><th>Selesai</th><th>Total Jam</th><th>Status</th><th>Catatan</th><th>Sync</th><th>Aksi</th></tr>
                        </thead>
                        <tbody>
                            ${userReports.map(r => `
                                <tr>
                                    <td contenteditable="true" onblur="updateField(${r.id}, 'tanggal', this.textContent)">${r.tanggal}</td>
                                    <td contenteditable="true" onblur="updateField(${r.id}, 'aktivitas', this.textContent)">${r.aktivitas}</td>
                                    <td contenteditable="true" onblur="updateField(${r.id}, 'mulai', this.textContent); updateTotalJamField(${r.id})">${r.mulai}</td>
                                    <td contenteditable="true" onblur="updateField(${r.id}, 'selesai', this.textContent); updateTotalJamField(${r.id})">${r.selesai}</td>
                                    <td class="number-cell">${r.totalJam} jam</td>
                                    <td>
                                        <select onchange="updateField(${r.id}, 'status', this.value); checkQREligibility(${r.id})" 
                                                style="padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;
                                                       ${r.status === 'Done' ? 'background: #d4edda; color: #155724;' : 
                                                         r.status === 'Progress' ? 'background: #fff3cd; color: #856404;' : 
                                                         'background: #f8d7da; color: #721c24;'}">
                                            <option value="Pending" ${r.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                            <option value="Progress" ${r.status === 'Progress' ? 'selected' : ''}>Progress</option>
                                            <option value="Done" ${r.status === 'Done' ? 'selected' : ''}>Done</option>
                                        </select>
                                    </select>
                                    </td>
                                    <td contenteditable="true" onblur="updateField(${r.id}, 'catatan', this.textContent)">${r.catatan || ''}</td>
                                    <td>${r.synced ? '✅ Tersync' : (isEligibleForQR(r) ? '📱 Siap Sync' : '⏳ Belum')}</td>
                                    <td style="white-space: nowrap;">
                                        <button onclick="clearRow(${r.id})" style="background:#e67e22; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; margin-right:4px; font-size:11px;">🗑️ Kosongkan</button>
                                        <button onclick="deleteRow(${r.id})" style="background:#e74c3c; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px;">❌ Hapus</button>
                                    </td>
                                </tr>
                            `).join('')}
                            ${userReports.length === 0 ? '<tr><td colspan="9" style="text-align:center;">Belum ada data. Klik "Tambah Baris" untuk memulai</td>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = qrHtml + tableHtml;
        
        setTimeout(() => {
            eligibleReports.forEach(report => {
                const qrId = `qr_${report.id}`;
                const element = document.getElementById(qrId);
                if (element && !element.hasChildNodes()) {
                    new QRCode(element, {
                        text: generateQRData(report),
                        width: 200,
                        height: 200
                    });
                }
            });
        }, 100);
    }
    
    window.updateField = function(id, field, value) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report[field] = value;
            if (field === 'mulai' || field === 'selesai') {
                report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            }
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.updateTotalJamField = function(id) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.checkQREligibility = function(id) {
        const report = reports.find(r => r.id === id);
        if (report && isEligibleForQR(report)) {
            renderOperatorPanel();
        }
    };
    
    window.markAsSynced = function(id) {
        const report = reports.find(r => r.id === id);
        if (report && isEligibleForQR(report)) {
            report.synced = true;
            report.syncDate = new Date().toISOString();
            
            syncQueue.unshift({
                id: report.id,
                operator: report.operator,
                operatorName: report.operatorName,
                divisi: report.divisi,
                tanggal: report.tanggal,
                aktivitas: report.aktivitas,
                totalJam: report.totalJam,
                syncDate: report.syncDate
            });
            
            saveToLocal();
            alert(`✅ Laporan tanggal ${report.tanggal} telah ditandai sync!`);
            renderOperatorPanel();
        }
    };
    
    window.addRowOperator = function() {
        const newId = reports.length > 0 ? Math.max(...reports.map(r => r.id)) + 1 : 1;
        const newRow = {
            id: newId,
            operator: currentUser.username,
            operatorName: currentUser.name,
            divisi: currentUser.divisi,
            tanggal: (() => {
                const d = new Date();
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                return `${day}/${month}/${year}`;
            })(),
            aktivitas: '',
            mulai: '',
            selesai: '',
            status: '',
            catatan: '',
            totalJam: '',
            synced: false,
            createdAt: new Date().toISOString()
        };
        reports.push(newRow);
        saveToLocal();
        renderOperatorPanel();
    };
    
    window.clearRow = function(rowId) {
        const report = reports.find(r => r.id === rowId);
        if (report && confirm(`Kosongkan semua kolom pada baris ini?`)) {
            report.aktivitas = '';
            report.mulai = '';
            report.selesai = '';
            report.catatan = '';
            report.totalJam = '0.0';
            report.status = 'Pending';
            saveToLocal();
            renderOperatorPanel();
            alert('Isi baris telah dikosongkan');
        }
    };
    
    window.deleteRow = function(rowId) {
        if (confirm(`Yakin ingin menghapus baris ini secara permanen?`)) {
            reports = reports.filter(r => r.id !== rowId);
            saveToLocal();
            renderOperatorPanel();
            alert('Baris telah dihapus');
        }
    };
    
    window.clearAllRows = function() {
        if (confirm('PERINGATAN: Ini akan menghapus SEMUA data laporan Anda! Lanjutkan?')) {
            reports = reports.filter(r => r.operator !== currentUser.username);
            saveToLocal();
            renderOperatorPanel();
            alert('Semua baris Anda telah dihapus');
        }
    };
    
    // ==================== ADMIN PANEL ====================
    function renderAdminPanel() {
        const syncedItems = syncQueue;
        
        let content = `
            <div class="scanner-container" id="scanner-container">
                <div class="qr-title">📷 Scanner QR Code</div>
                <div class="scanner-buttons">
                    <button class="camera-btn start" id="btnStartScan" onclick="startScanner()">▶️ Start Scanner</button>
                    <button class="camera-btn stop" id="btnStopScan" onclick="stopScanner()" disabled>⏹️ Stop Scanner</button>
                </div>
                <div class="video-container">
                    <div id="preview"></div>
                </div>
                <div class="scan-result info" id="scanResult">🔍 Klik Start Scanner untuk memulai</div>
            </div>
            
            <div class="qr-container">
                <div class="qr-title">📋 Riwayat Sync dari Operator</div>
                <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                    <button class="toolbar-btn excel" onclick="exportSyncQueueToExcel()">📎 Export Sync Queue XLSX</button>
                </div>
                ${syncedItems.length === 0 ? '<div class="qr-status info">Belum ada data sync dari operator</div>' : ''}
                ${syncedItems.map(s => `
                    <div class="qr-status success" style="margin:8px 0;">
                        ✅ ${s.tanggal} - ${s.operatorName} (${s.divisi}) - "${s.aktivitas.substring(0,40)}..." - ${s.totalJam} jam
                        <br><small>Sync: ${new Date(s.syncDate).toLocaleString('id')}</small>
                    </div>
                `).join('')}
            </div>
            
            <div class="tabs-container">
                <div class="tabs-header">
                    ${operators.map((op, idx) => `<button class="tab-btn ${idx === 0 ? 'active' : ''}" onclick="switchTab('tab_${op.username}')">👤 ${op.name}<br><span style="font-size:10px;">${op.divisi}</span></button>`).join('')}
                    <button class="tab-btn" onclick="exportAllToExcel()">📎 Export Semua XLSX</button>
                </div>
                ${operators.map((op, idx) => {
                    const opReports = reports.filter(r => r.operator === op.username);
                    return `
                        <div class="tab-content ${idx === 0 ? 'active' : ''}" id="tab_${op.username}">
                            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                                <button class="toolbar-btn excel" onclick="exportOperatorToExcel('${op.username}')">📎 Export ${op.name} XLSX</button>
                            </div>
                            <div class="spreadsheet-wrapper">
                                <table class="spreadsheet-table">
                                    <thead>
                                        <tr><th>Tanggal</th><th>Aktivitas</th><th>Mulai</th><th>Selesai</th><th>Total Jam</th><th>Status</th><th>Catatan</th><th>Sync Status</th></tr>
                                    </thead>
                                    <tbody>
                                        ${opReports.map(r => `
                                            <tr>
                                                <td>${r.tanggal}</td>
                                                <td>${r.aktivitas}</td>
                                                <td>${r.mulai}</td>
                                                <td>${r.selesai}</td>
                                                <td class="number-cell">${r.totalJam} jam</td>
                                                <td>
                                                    <span class="status-badge ${r.status === 'Done' ? 'status-done' : r.status === 'Progress' ? 'status-progress' : 'status-pending'}">
                                                        ${r.status}
                                                    </span>
                                                </td>
                                                <td>${r.catatan || '-'}</td>
                                                <td>${r.synced ? '<span style="color:green;">✅ Tersync</span>' : (parseFloat(r.totalJam) >= 8 && r.status === 'Done' ? '📱 Siap Sync' : '⏳ Belum')}</td>
                                            </tr>
                                        `).join('')}
                                        ${opReports.length === 0 ? '<tr><td colspan="8" style="text-align:center;">Belum ada data laporan</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = content;
    }
    
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        const index = Array.from(document.querySelectorAll('.tab-content')).findIndex(tab => tab.id === tabId);
        if (btns[index]) btns[index].classList.add('active');
    };
    
    // ==================== LOGIN ====================
    function handleLogin() {
        const roleBtn = document.querySelector('.role-btn.active');
        const role = roleBtn ? roleBtn.dataset.role : 'operator';
        const selectedValue = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!selectedValue) {
            document.getElementById('loginError').textContent = 'Pilih username!';
            return;
        }
        
        if (role === 'admin') {
            if (selectedValue === 'admin' && password === 'leader01') {
                currentUser = { username: 'admin', name: 'Administrator', role: 'admin', divisi: 'Admin' };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Username atau password admin salah!';
            }
        } else {
            const operator = operators.find(op => op.username === selectedValue);
            if (operator && operator.password === password) {
                currentUser = { username: operator.username, name: operator.name, role: 'operator', divisi: operator.divisi };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Password salah!';
            }
        }
    }
    
    function showMainApp() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userRoleBadge').textContent = currentUser.role === 'admin' ? '👑 Admin' : '👤 Operator';
        document.getElementById('userNameDisplay').textContent = currentUser.name;
        
        if (currentUser.role === 'admin') {
            renderAdminPanel();
        } else {
            renderOperatorPanel();
        }
    }
    
    async function logout() {
        await stopScanner();
        currentUser = null;
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('loginPanel').style.display = 'flex';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
    }
    
    // Role selector
    document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const dropdown = document.getElementById('loginUsername');
            if (this.dataset.role === 'admin') {
                dropdown.innerHTML = '<option value="admin">Admin</option>';
            } else {
                dropdown.innerHTML = `
                    <option value="">-- Pilih Operator --</option>
                    <option value="darma">Darma (Raw Material)</option>
                    <option value="nurhadi">Nurhadi (Raw Material)</option>
                    <option value="athar">Athar (Finish Goods)</option>
                    <option value="purnomo">Purnomo (Save Material)</option>
                `;
            }
        });
    });
    
    // Splash screen
    let progress = 0;
    const interval = setInterval(() => {
        progress += 20;
        document.getElementById('progressFill').style.width = progress + '%';
        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('loginPanel').style.display = 'flex';
                }, 500);
            }, 300);
        }
    }, 200);
    
    loadFromLocal();
    
    // Expose functions globally
    window.startScanner = startScanner;
    window.stopScanner = stopScanner;
    window.updateField = updateField;
    window.updateTotalJamField = updateTotalJamField;
    window.checkQREligibility = checkQREligibility;
    window.markAsSynced = markAsSynced;
    window.addRowOperator = addRowOperator;
    window.switchTab = switchTab;
    window.handleScanResult = handleScanResult;
    window.exportAllToExcel = exportAllToExcel;
    window.exportOperatorToExcel = exportOperatorToExcel;
    window.exportSyncQueueToExcel = exportSyncQueueToExcel;
</script>
</body>
</html>
