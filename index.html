<script>
    // ==================== DATA ====================
    const operators = [
        { username: 'darma', password: 'rmd123', name: 'Darma', divisi: 'Raw Material' },
        { username: 'nurhadi', password: 'rmn123', name: 'Nurhadi', divisi: 'Raw Material' },
        { username: 'athar', password: 'fg123', name: 'Athar', divisi: 'Finish Goods' },
        { username: 'purnomo', password: 'sm123', name: 'Purnomo', divisi: 'Save Material' }
    ];
    
    let reports = [];
    let syncQueue = [];
    let currentUser = null;
    let html5QrCode = null;
    let isScanning = false;
    let scanActive = false;
    let autoStopTimeout = null;
    let currentDateFilter = '';
    let transferScanner = null;
    
    // Load data
    function loadFromLocal() {
        const saved = localStorage.getItem('daily_report_qr_system');
        if (saved) {
            const data = JSON.parse(saved);
            reports = data.reports || [];
            syncQueue = data.syncQueue || [];
        } else {
            reports = [];
            syncQueue = [];
        }
    }
    
    // Reset semua data
    function resetAllData() {
        if (currentUser && currentUser.role === 'admin') {
            if (confirm('⚠️ PERINGATAN: Ini akan menghapus SEMUA data laporan dan riwayat sync!\n\nSetelah reset, semua laporan akan hilang.\n\nAnda yakin ingin melanjutkan?')) {
                localStorage.removeItem('daily_report_qr_system');
                reports = [];
                syncQueue = [];
                saveToLocal();
                
                if (currentUser.role === 'admin') {
                    renderAdminPanel();
                }
                
                alert('✅ Semua data berhasil direset!');
            }
        } else {
            alert('Reset data hanya dapat dilakukan oleh Admin!');
        }
    }
    
    // Reset status sync saja
    function resetSyncStatusOnly() {
        if (currentUser && currentUser.role === 'admin') {
            if (confirm('⚠️ PERINGATAN: Ini akan mereset status sync SEMUA laporan!\n\nLaporan yang sudah pernah di-sync akan bisa di-scan ULANG.\n\nData laporan TIDAK akan terhapus.\n\nLanjutkan?')) {
                let resetCount = 0;
                reports.forEach(report => {
                    if (report.synced === true) {
                        report.synced = false;
                        report.syncDate = null;
                        resetCount++;
                    }
                });
                
                saveToLocal();
                
                alert(`✅ Status sync ${resetCount} laporan telah direset!\n\nSekarang laporan tersebut bisa di-scan ulang.`);
                renderAdminPanel();
            }
        }
    }
    
    // Reset riwayat sync saja
    function resetSyncHistoryOnly() {
        if (currentUser && currentUser.role === 'admin') {
            if (confirm('⚠️ PERINGATAN: Ini akan menghapus SEMUA riwayat scan QR (Sync Queue)!\n\nStatus sync pada laporan TIDAK akan berubah.\n\nLanjutkan?')) {
                const historyCount = syncQueue.length;
                syncQueue = [];
                saveToLocal();
                
                alert(`✅ ${historyCount} riwayat sync berhasil dihapus!\n\nStatus sync laporan tidak berubah.`);
                renderAdminPanel();
            }
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('daily_report_qr_system', JSON.stringify({ reports, syncQueue }));
    }
    
    function calculateTotalJam(mulai, selesai) {
        if (!mulai || !selesai) return '0.0';
        const start = new Date(`2000-01-01T${mulai}`);
        const end = new Date(`2000-01-01T${selesai}`);
        if (isNaN(start) || isNaN(end)) return '0.0';
        const diff = (end - start) / (1000 * 60 * 60);
        return diff > 0 ? diff.toFixed(1) : '0.0';
    }
    
    function getTodayDate() {
        const d = new Date();
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }
    
    function getDailyUniqueCode(operatorName, tanggal, divisi, id) {
        const operatorCode = operatorName.toUpperCase().substring(0, 5);
        const divisiCode = divisi.substring(0, 2).toUpperCase();
        return `${operatorCode}_${tanggal.replace(/\//g, '-')}_${divisiCode}_${id}`;
    }
    
    function isEligibleForQR(report) {
        const totalJam = parseFloat(report.totalJam);
        return totalJam >= 8.0 && !report.synced;
    }
    
    function generateQRData(report) {
        const uniqueCode = getDailyUniqueCode(report.operatorName, report.tanggal, report.divisi, report.id);
        
        return JSON.stringify({
            type: 'DAILY_REPORT_SYNC',
            version: '1.0',
            uniqueCode: uniqueCode,
            id: report.id,
            operator: report.operator,
            operatorName: report.operatorName,
            divisi: report.divisi,
            tanggal: report.tanggal,
            aktivitas: report.aktivitas,
            totalJam: report.totalJam,
            status: report.status,
            timestamp: new Date().toISOString()
        });
    }
    
    function generateQRCode(element, text, size = 200) {
        if (!element) return;
        element.innerHTML = '';

    async function processPastedData() {
        const pasteData = document.getElementById('importPasteData').value.trim();
        if (!pasteData) {
            alert('❌ Tidak ada data untuk diimport!');
            return;
        }
        
        try {
            const decodedData = decodeURIComponent(atob(pasteData));
            const importedData = JSON.parse(decodedData);
            processImportData(importedData);
        } catch (err) {
            alert('❌ Gagal membaca data! Pastikan kode yang di-paste benar.');
        }
    }
    
    function importFromFile(file) {
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                processImportData(importedData);
            } catch (err) {
                alert('❌ Gagal membaca file! Format tidak valid.');
            }
        };
        reader.readAsText(file);
    }
    
    function processImportData(importedData) {
        if (!importedData.reports || !Array.isArray(importedData.reports)) {
            alert('❌ Format data tidak valid!');
            return;
        }
        
        let newCount = 0;
        let duplicateCount = 0;
        
        importedData.reports.forEach(newReport => {
            const exists = reports.some(r => r.id === newReport.id);
            if (!exists) {
                reports.push(newReport);
                newCount++;
            } else {
                duplicateCount++;
            }
        });
        
        saveToLocal();
        closeImportModal();
        
        alert(`✅ Import berhasil!\n\n📝 Laporan baru: ${newCount}\n🔄 Duplikat (dilewati): ${duplicateCount}\n👤 Operator: ${importedData.operatorName}\n📋 Divisi: ${importedData.operatorDivisi}`);
        
        if (currentUser.role === 'admin') {
            renderAdminPanel();
        }
    }

    async function startScanner() {
        if (html5QrCode && isScanning) {
            await stopScanner();

            await html5QrCode.start(

                scanResultDiv.innerHTML = "📷 Scanner aktif - siap scan QR Code";

    async function stopScanner() {
        if (autoStopTimeout) clearTimeout(autoStopTimeout);
        
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
                html5QrCode.clear();
            } catch (err) {}
            isScanning = false;
            scanActive = false;
        }
        
        const startBtn = document.getElementById('btnStartScan');
        const stopBtn = document.getElementById('btnStopScan');
        const scanResultDiv = document.getElementById('scanResult');
        
        if (startBtn) startBtn.disabled = false;
        if (stopBtn) stopBtn.disabled = true;
        if (scanResultDiv && scanResultDiv.innerHTML !== "✅ Berhasil sync, kamera otomatis dimatikan!") {
            scanResultDiv.innerHTML = "⏹️ Scanner dihentikan. Klik 'Start Scanner' untuk memulai.";
            scanResultDiv.className = "scan-result warning";
        }
        
        const previewDiv = document.getElementById('preview');
        if (previewDiv) previewDiv.innerHTML = '';

    }
    
    async function autoStopScannerAfterSync(message) {
        const scanResultDiv = document.getElementById('scanResult');
        if (scanResultDiv) {
            scanResultDiv.innerHTML = message;
            scanResultDiv.className = "scan-result success";
        }
        
        setTimeout(async () => {
            if (scanResultDiv && isScanning) {
                scanResultDiv.innerHTML = "✅ Berhasil sync, kamera otomatis dimatikan!";
            }
            await stopScanner();
        }, 1500);
    }
    
    function handleScanResult(decodedText) {
        const scanResultDiv = document.getElementById('scanResult');
        
        try {
            const data = JSON.parse(decodedText);
            
            if (data.type === 'DAILY_REPORT_SYNC') {
                let report = null;
                
                if (data.id) report = reports.find(r => r.id === data.id);
                if (!report && data.uniqueCode) {
                    report = reports.find(r => getDailyUniqueCode(r.operatorName, r.tanggal, r.divisi, r.id) === data.uniqueCode);
                }
                if (!report && data.operatorName && data.tanggal && data.aktivitas) {
                    report = reports.find(r => r.operatorName === data.operatorName && r.tanggal === data.tanggal && r.aktivitas === data.aktivitas);
                }
                if (!report && data.operatorName && data.tanggal) {
                    const candidates = reports.filter(r => r.operatorName === data.operatorName && r.tanggal === data.tanggal && !r.synced);
                    if (candidates.length === 1) report = candidates[0];
                    else if (candidates.length > 1) report = candidates.find(r => parseFloat(r.totalJam) >= 8.0);
                }
                
                if (report) {
                    if (report.synced) {
                        scanResultDiv.innerHTML = `⚠️ Laporan ${report.operatorName} tgl ${report.tanggal} sudah di-sync!`;
                        scanResultDiv.className = "scan-result error";
                        setTimeout(() => autoStopScannerAfterSync(`⚠️ Sudah di-sync`), 2000);
                    } else if (parseFloat(report.totalJam) >= 8.0) {
                        report.synced = true;
                        report.syncDate = new Date().toISOString();
                        
                        syncQueue.unshift({
                            id: report.id,
                            uniqueCode: getDailyUniqueCode(report.operatorName, report.tanggal, report.divisi, report.id),
                            operator: report.operator,
                            operatorName: report.operatorName,
                            divisi: report.divisi,
                            tanggal: report.tanggal,
                            aktivitas: report.aktivitas,
                            totalJam: report.totalJam,
                            syncDate: report.syncDate
                        });
                        
                        saveToLocal();
                        scanResultDiv.innerHTML = `✅ BERHASIL! ${report.operatorName} - ${report.tanggal}\nTotal jam: ${report.totalJam} jam`;
                        scanResultDiv.className = "scan-result success";
                        
                        if (currentUser?.role === 'admin') setTimeout(() => renderAdminPanel(), 1500);
                        autoStopScannerAfterSync(`✅ Sync berhasil!`);
                    } else {
                        scanResultDiv.innerHTML = `❌ GAGAL! Total jam: ${report.totalJam} jam (minimal 8 jam)`;
                        scanResultDiv.className = "scan-result error";
                        setTimeout(() => autoStopScannerAfterSync(`❌ Total jam < 8 jam`), 2000);
                    }
                } else {
                    scanResultDiv.innerHTML = `❌ QR Code tidak valid! Laporan tidak ditemukan.`;
                    scanResultDiv.className = "scan-result error";
                    setTimeout(() => autoStopScannerAfterSync(`❌ Laporan tidak ditemukan`), 2000);
                }
            } else {
                scanResultDiv.innerHTML = `❌ QR Code tidak valid!`;
                scanResultDiv.className = "scan-result error";
                setTimeout(() => autoStopScannerAfterSync(`❌ QR tidak valid`), 2000);
            }
        } catch (e) {
            scanResultDiv.innerHTML = `❌ QR Code tidak dapat dibaca!`;
            scanResultDiv.className = "scan-result error";
            setTimeout(() => autoStopScannerAfterSync(`❌ Format QR salah`), 2000);
        }
        
        if (navigator.vibrate) navigator.vibrate(200);
    }

                                        <td contenteditable="true" onblur="updateField(${r.id}, 'tanggal', this.textContent)">${r.tanggal}<br><small style="font-size:9px;">${uniqueCode}</small></td>
                                        <td contenteditable="true" onblur="updateField(${r.id}, 'aktivitas', this.textContent)">${r.aktivitas || '(kosong)'}</td>
                                        <td contenteditable="true" onblur="updateField(${r.id}, 'mulai', this.textContent); updateTotalJamField(${r.id})">${r.mulai || '-'}</td>
                                        <td contenteditable="true" onblur="updateField(${r.id}, 'selesai', this.textContent); updateTotalJamField(${r.id})">${r.selesai || '-'}</td>
                                        <td class="number-cell">${r.totalJam} jam</td>
                                        <td>
                                            <select onchange="updateField(${r.id}, 'status', this.value)" 
                                                    style="padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd;
                                                           ${r.status === 'Done' ? 'background: #d4edda; color: #155724;' : 
                                                             r.status === 'Progress' ? 'background: #fff3cd; color: #856404;' : 
                                                             'background: #f8d7da; color: #721c24;'}">
                                                <option value="Pending" ${r.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                                <option value="Progress" ${r.status === 'Progress' ? 'selected' : ''}>Progress</option>
                                                <option value="Done" ${r.status === 'Done' ? 'selected' : ''}>Done</option>
                                            </select>
                                        </td>
                                        <td contenteditable="true" onblur="updateField(${r.id}, 'catatan', this.textContent)">${r.catatan || ''}</td>
                                        <td>${r.synced ? '✅ Tersync' : (isEligibleForQR(r) ? '📱 Siap Sync' : '⏳ Belum')}</td>
                                        <td style="white-space: nowrap;">
                                            <button onclick="clearRow(${r.id})" style="background:#e67e22; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; margin-right:4px; font-size:11px;">🗑️ Kosongkan</button>
                                            <button onclick="deleteRow(${r.id})" style="background:#e74c3c; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px;">❌ Hapus</button>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                            ${filteredReports.length === 0 ? '<tr><td colspan="9" style="text-align:center; padding: 30px;">📋 Belum ada data. Klik "Tambah Baris Baru" untuk memulai</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = qrHtml + tableHtml;
        
        setTimeout(() => {
            eligibleReports.forEach(report => {
                const qrId = `qr_${report.id}`;
                const element = document.getElementById(qrId);
                if (element) {
                    const qrData = generateQRData(report);
                    generateQRCode(element, qrData, 200);
                }
            });
        }, 100);
    }
    
    window.filterByDate = function(date) {
        currentDateFilter = date;
        renderOperatorPanel();
    };
    
    window.clearDateFilter = function() {
        currentDateFilter = '';
        renderOperatorPanel();
    };
    
    window.updateField = function(id, field, value) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report[field] = value;
            if (field === 'mulai' || field === 'selesai') {
                report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            }
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.updateTotalJamField = function(id) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.markAsSynced = function(id) {
        const report = reports.find(r => r.id === id);
        if (report && isEligibleForQR(report)) {
            report.synced = true;
            report.syncDate = new Date().toISOString();
            
            syncQueue.unshift({
                id: report.id,
                uniqueCode: getDailyUniqueCode(report.operatorName, report.tanggal, report.divisi, report.id),
                operator: report.operator,
                operatorName: report.operatorName,
                divisi: report.divisi,
                tanggal: report.tanggal,
                aktivitas: report.aktivitas,
                totalJam: report.totalJam,
                syncDate: report.syncDate
            });
            
            saveToLocal();
            alert(`✅ Laporan "${report.aktivitas}" tanggal ${report.tanggal} telah ditandai sync!`);
            renderOperatorPanel();
        } else if (report && parseFloat(report.totalJam) < 8.0) {
            alert(`⚠️ Laporan belum memenuhi syarat! Total jam: ${report.totalJam} jam (minimal 8 jam)`);
        }
    };
    
    window.addRowOperator = function() {
        const today = getTodayDate();
        
        const newId = reports.length > 0 ? Math.max(...reports.map(r => r.id)) + 1 : 1;
        const newRow = {
            id: newId,
            operator: currentUser.username,
            operatorName: currentUser.name,
            divisi: currentUser.divisi,
            tanggal: today,
            aktivitas: '',
            mulai: '',
            selesai: '',
            status: 'Pending',
            catatan: '',
            totalJam: '0.0',
            synced: false,
            createdAt: new Date().toISOString()
        };
        reports.push(newRow);
        saveToLocal();
        
        if (currentDateFilter) currentDateFilter = '';
        renderOperatorPanel();
        
        setTimeout(() => {
            const rows = document.querySelectorAll('.spreadsheet-table tbody tr');
            if (rows.length > 0) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        
        alert(`✅ Baris baru telah ditambahkan untuk tanggal ${today}!\n\nSilakan isi aktivitas, jam mulai, dan jam selesai.`);
    };
    
    window.clearRow = function(rowId) {
        const report = reports.find(r => r.id === rowId);
        if (report && confirm(`Kosongkan semua kolom pada baris ini?`)) {
            report.aktivitas = '';
            report.mulai = '';
            report.selesai = '';
            report.catatan = '';
            report.totalJam = '0.0';
            report.status = 'Pending';
            saveToLocal();
            renderOperatorPanel();
            alert('Isi baris telah dikosongkan');
        }
    };
    
    window.deleteRow = function(rowId) {
        if (confirm(`Yakin ingin menghapus baris ini secara permanen?`)) {
            reports = reports.filter(r => r.id !== rowId);
            saveToLocal();
            renderOperatorPanel();
            alert('Baris telah dihapus');
        }
    };
    
    // ==================== ADMIN PANEL ====================
    function renderAdminPanel() {
        const syncedItems = syncQueue;
        const syncedReportsCount = reports.filter(r => r.synced === true).length;
        
        let content = `
            <div class="scanner-container" id="scanner-container">
                <div class="qr-title">📷 Scanner QR Code</div>
                <div class="scanner-buttons">
                    <button class="camera-btn start" onclick="startScanner()">▶️ Start Scanner (Sync)</button>
                    <button class="camera-btn stop" onclick="stopScanner()" disabled>⏹️ Stop Scanner</button>
                    <button class="camera-btn" onclick="startTransferScanner()" style="background:#9b59b6;">📱 Scan Transfer QR</button>
                    <button class="camera-btn" onclick="showImportModal()" style="background:#f39c12;">📥 Import Data</button>
                </div>
                <div class="video-container">
                    <div id="preview"></div>
                </div>
                <div class="scan-result info" id="scanResult">🔍 Klik Start Scanner untuk memulai</div>
            </div>
            
            <div class="qr-container">
                <div class="qr-title">📋 Manajemen Data</div>
                <div class="btn-group">
                    <button class="toolbar-btn reset" onclick="resetAllData()">🗑️ Reset Semua Data</button>
                    <button class="toolbar-btn sync-reset" onclick="resetSyncStatusOnly()">🔄 Reset Status Sync (${syncedReportsCount} laporan)</button>
                    <button class="toolbar-btn history-reset" onclick="resetSyncHistoryOnly()">📋 Reset Riwayat Sync (${syncedItems.length} item)</button>
                    <button class="toolbar-btn excel" onclick="exportSyncQueueToExcel()">📎 Export Sync Queue XLSX</button>
                </div>
                <div class="reset-info">
                    💡 <strong>Keterangan:</strong><br>
                    • <strong style="color:#e74c3c;">Reset Semua Data</strong> = Hapus semua laporan + riwayat sync<br>
                    • <strong style="color:#e67e22;">Reset Status Sync</strong> = Laporan bisa di-scan ULANG (tanpa hapus data)<br>
                    • <strong style="color:#3498db;">Reset Riwayat Sync</strong> = Hapus catatan scan QR saja
                </div>
            </div>
            
            <div class="qr-container">
                <div class="qr-title">📋 Riwayat Sync dari Operator</div>
                ${syncedItems.length === 0 ? '<div class="qr-status info">Belum ada data sync dari operator</div>' : ''}
                ${syncedItems.map(s => `
                    <div class="qr-status success" style="margin:8px 0;">
                        ✅ ${s.tanggal} - ${s.operatorName} (${s.divisi}) - "${s.aktivitas?.substring(0,40) || '-'}" - ${s.totalJam} jam<br>
                        <small>Unique Code: ${s.uniqueCode}</small>
                        <br><small>Sync: ${new Date(s.syncDate).toLocaleString('id')}</small>
                    </div>
                `).join('')}
            </div>
            
            <div class="tabs-container">
                <div class="tabs-header">
                    ${operators.map((op, idx) => `<button class="tab-btn ${idx === 0 ? 'active' : ''}" onclick="switchTab('tab_${op.username}')">👤 ${op.name}<br><span style="font-size:10px;">${op.divisi}</span></button>`).join('')}
                    <button class="tab-btn" onclick="exportAllToExcel()">📎 Export Semua XLSX</button>
                </div>
                ${operators.map((op, idx) => {
                    const opReports = reports.filter(r => r.operator === op.username);
                    return `
                        <div class="tab-content ${idx === 0 ? 'active' : ''}" id="tab_${op.username}">
                            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                                <button class="toolbar-btn excel" onclick="exportOperatorToExcel('${op.username}')">📎 Export ${op.name} XLSX</button>
                            </div>
                            <div class="spreadsheet-wrapper">
                                <table class="spreadsheet-table">
                                    <thead>
                                        <tr><th>Tanggal</th><th>Unique Code</th><th>Aktivitas</th><th>Mulai</th><th>Selesai</th><th>Total Jam</th><th>Status</th><th>Catatan</th><th>Sync Status</th></tr>
                                    </thead>
                                    <tbody>
                                        ${opReports.map(r => {
                                            const uniqueCode = getDailyUniqueCode(r.operatorName, r.tanggal, r.divisi, r.id);
                                            return `
                                                <tr>
                                                    <td>${r.tanggal}</td>
                                                    <td><small>${uniqueCode}</small></td>
                                                    <td>${r.aktivitas || '-'}</td>
                                                    <td>${r.mulai || '-'}</td>
                                                    <td>${r.selesai || '-'}</td>
                                                    <td class="number-cell">${r.totalJam} jam</td>
                                                    <td><span class="status-badge ${r.status === 'Done' ? 'status-done' : r.status === 'Progress' ? 'status-progress' : 'status-pending'}">${r.status}</span></td>
                                                    <td>${r.catatan || '-'}</td>
                                                    <td>${r.synced ? '<span style="color:green;">✅ Tersync</span>' : (parseFloat(r.totalJam) >= 8 ? '📱 Siap Sync' : '⏳ Belum')}</td>
                                                </tr>
                                            `;
                                        }).join('')}
                                        ${opReports.length === 0 ? '<tr><td colspan="9" style="text-align:center;">Belum ada data laporan</td></tr>' : ''}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = content;
    }
    
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        const index = Array.from(document.querySelectorAll('.tab-content')).findIndex(tab => tab.id === tabId);
        if (btns[index]) btns[index].classList.add('active');
    };
    
    // ==================== LOGIN ====================
    function handleLogin() {
        const roleBtn = document.querySelector('.role-btn.active');
        const role = roleBtn ? roleBtn.dataset.role : 'operator';
        const selectedValue = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!selectedValue) {
            document.getElementById('loginError').textContent = 'Pilih username!';
            return;
        }
        
        if (role === 'admin') {
            if (selectedValue === 'admin' && password === 'leader01') {
                currentUser = { username: 'admin', name: 'Administrator', role: 'admin', divisi: 'Admin' };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Username atau password admin salah!';
            }
        } else {
            const operator = operators.find(op => op.username === selectedValue);
            if (operator && operator.password === password) {
                currentUser = { username: operator.username, name: operator.name, role: 'operator', divisi: operator.divisi };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Password salah!';
            }
        }
    }
    
    function showMainApp() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('userRoleBadge').textContent = currentUser.role === 'admin' ? '👑 Admin' : '👤 Operator';
        document.getElementById('userNameDisplay').textContent = currentUser.name;
        
        if (currentUser.role === 'admin') {
            renderAdminPanel();
        } else {
            currentDateFilter = '';
            renderOperatorPanel();
        }
    }
    
    async function logout() {
        await stopScanner();
        currentUser = null;
        currentDateFilter = '';
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('loginPanel').style.display = 'flex';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
    }
    
    // Role selector
    document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const dropdown = document.getElementById('loginUsername');
            if (this.dataset.role === 'admin') {
                dropdown.innerHTML = '<option value="admin">Admin</option>';
            } else {
                dropdown.innerHTML = `
                    <option value="">-- Pilih Operator --</option>
                    <option value="darma">Darma (Raw Material)</option>
                    <option value="nurhadi">Nurhadi (Raw Material)</option>
                    <option value="athar">Athar (Finish Goods)</option>
                    <option value="purnomo">Purnomo (Save Material)</option>
                `;
            }
        });
    });
    
    // Splash screen
    let progress = 0;
    const interval = setInterval(() => {
        progress += 20;
        document.getElementById('progressFill').style.width = progress + '%';
        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('loginPanel').style.display = 'flex';
                }, 500);
            }, 300);
        }
    }, 200);
    
    loadFromLocal();
    
    // Expose functions globally
    window.startScanner = startScanner;
    window.stopScanner = stopScanner;
    window.updateField = updateField;
    window.updateTotalJamField = updateTotalJamField;
    window.markAsSynced = markAsSynced;
    window.addRowOperator = addRowOperator;
    window.switchTab = switchTab;
    window.handleScanResult = handleScanResult;
    window.exportAllToExcel = exportAllToExcel;
    window.exportOperatorToExcel = exportOperatorToExcel;
    window.exportSyncQueueToExcel = exportSyncQueueToExcel;
    window.resetAllData = resetAllData;
    window.resetSyncStatusOnly = resetSyncStatusOnly;
    window.resetSyncHistoryOnly = resetSyncHistoryOnly;
    window.filterByDate = filterByDate;
    window.clearDateFilter = clearDateFilter;
    window.clearRow = clearRow;
    window.deleteRow = deleteRow;
    window.sendViaWhatsApp = sendViaWhatsApp;
    window.sendViaEmail = sendViaEmail;
    window.copyToClipboard = copyToClipboard;
    window.generateTransferQR = generateTransferQR;
    window.closeTransferModal = closeTransferModal;
    window.startTransferScanner = startTransferScanner;
    window.closeTransferScanModal = closeTransferScanModal;
    window.showImportModal = showImportModal;
    window.closeImportModal = closeImportModal;
    window.importFromClipboard = importFromClipboard;
    window.processPastedData = processPastedData;
    window.processImportData = processImportData;
</script>
</body>
