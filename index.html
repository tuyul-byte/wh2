<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Daily Report System - QR Transfer</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Splash Screen */
.splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}

.splash-content {
    text-align: center;
    color: white;
}

.splash-logo {
    font-size: 64px;
    margin-bottom: 20px;
    animation: bounce 1s ease infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

.progress-bar {
    width: 250px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    margin: 30px auto 0;
    overflow: hidden;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: white;
    border-radius: 10px;
    transition: width 0.3s ease;
}

/* Login Panel */
.login-container {
    display: none;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;

    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-header {
    text-align: center;
    margin-bottom: 15px;
}

.login-header h2 {
    font-size: 28px;

    font-size: 14px;

.login-header.with-spacing {

}

.divider {

    background: linear-gradient(90deg, transparent, #ccc, transparent);
    margin: 25px 0 20px 0;
}

.role-selector {

}

.role-btn {

.input-group label {

    border-radius: 10px;

}

.input-group input:focus, .input-group select:focus {

}

.login-btn {

<body>

<!-- SPLASH SCREEN -->
<div class="splash-screen" id="splash">
    <div class="splash-content">
        <div class="splash-logo">📱</div>
        <div class="splash-title">Daily Report System</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
</div>

<!-- LOGIN PANEL -->
<div class="login-container" id="loginPanel">
    <div class="login-card">
        <div class="login-header with-spacing">
            <h2>Daily Report System</h2>
            <p>Warehouse</p>
            <p style="font-size: 16px; color: #888;">PT. TRPC Manufacturing Indonesia</p>
        </div>
        
        <div class="divider"></div>
        
        <div class="role-selector">
            <button class="role-btn active" data-role="operator">👤 Operator</button>
            <button class="role-btn" data-role="admin">👑 Admin</button>
        </div>
        
        <div class="input-group">
            <label>👥 Pilih Username</label>
            <select id="loginUsername">
                <option value="">-- Pilih Operator --</option>
                <option value="darma">Darma</option>
                <option value="nurhadi">Nurhadi</option>
                <option value="athar">Athar</option>
                <option value="purnomo">Purnomo</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>🔐 Password</label>
            <input type="password" id="loginPassword" placeholder="Masukkan password">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">Login →</button>
        
        <div class="error-msg" id="loginError"></div>
        
        <div class="info-login">
            <p><strong>🔐 Informasi Login:</strong></p>
            <p>Darma (Raw Material) : <strong>rmd123</strong></p>
            <p>Nurhadi (Raw Material) : <strong>rmn123</strong></p>
            <p>Athar (Finish Goods) : <strong>fg123</strong></p>
            <p>Purnomo (Save Material) : <strong>sm123</strong></p>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div class="app-container" id="appContainer">
    <div class="navbar">
        <h2>📱 Daily Report System</h2>
        <div class="user-info">
            <span class="user-badge" id="userRoleBadge">Operator</span>
            <span id="userNameDisplay">User</span>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ==================== DATA ====================
    const operators = [
        { username: 'darma', password: 'rmd123', name: 'Darma', divisi: 'Raw Material' },
        { username: 'nurhadi', password: 'rmn123', name: 'Nurhadi', divisi: 'Raw Material' },
        { username: 'athar', password: 'fg123', name: 'Athar', divisi: 'Finish Goods' },
        { username: 'purnomo', password: 'sm123', name: 'Purnomo', divisi: 'Save Material' }
    ];
    
    let reports = [];
    let currentUser = null;
    let transferScanner = null;
    let isScanning = false;
    let currentDateFilter = '';
    
    // Load data
    function loadFromLocal() {
        const saved = localStorage.getItem('daily_report_system');
        if (saved) {
            const data = JSON.parse(saved);
            reports = data.reports || [];
        } else {
            reports = [];
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('daily_report_system', JSON.stringify({ reports }));
    }
    
    // Reset semua data
    function resetAllData() {
        if (currentUser && currentUser.role === 'admin') {
            if (confirm('⚠️ PERINGATAN: Ini akan menghapus SEMUA data laporan!\n\nAnda yakin ingin melanjutkan?')) {
                localStorage.removeItem('daily_report_system');
                reports = [];
                saveToLocal();
                if (currentUser.role === 'admin') {
                    renderAdminPanel();
                }
                alert('✅ Semua data berhasil direset!');
            }
        } else {
            alert('Reset data hanya dapat dilakukan oleh Admin!');
        }
    }
    
    function calculateTotalJam(mulai, selesai) {
        if (!mulai || !selesai) return '0.0';
        const start = new Date(`2000-01-01T${mulai}`);
        const end = new Date(`2000-01-01T${selesai}`);
        if (isNaN(start) || isNaN(end)) return '0.0';
        const diff = (end - start) / (1000 * 60 * 60);
        return diff > 0 ? diff.toFixed(1) : '0.0';
    }
    
    function getTodayDate() {
        const d = new Date();
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }
    
    function getDailyUniqueCode(operatorName, tanggal, divisi, id) {
        const operatorCode = operatorName.toUpperCase().substring(0, 5);
        const divisiCode = divisi.substring(0, 2).toUpperCase();
        return `${operatorCode}_${tanggal.replace(/\//g, '-')}_${divisiCode}_${id}`;
    }
    
    function generateQRCode(element, text, size = 200) {
        if (!element) return;
        element.innerHTML = '';
        const img = document.createElement('img');
        img.src = `https://quickchart.io/qr?text=${encodeURIComponent(text)}&size=${size}&margin=2`;
        img.style.width = `${size}px`;
        img.style.height = `${size}px`;
        img.style.display = 'block';
        img.style.margin = '0 auto';
        img.alt = 'QR Code';
        element.appendChild(img);
    }
    
    // ==================== FITUR TRANSFER DATA ANTAR PERANGKAT ====================
    
    function getExportData() {
        const userReports = reports.filter(r => r.operator === currentUser.username);
        return {
            type: 'TRANSFER_DATA',
            version: '1.0',
            reports: userReports,
            operatorName: currentUser.name,
            operatorDivisi: currentUser.divisi,
            exportDate: new Date().toISOString(),
            totalLaporan: userReports.length
        };
    }
    
    function sendViaWhatsApp() {
        const data = getExportData();
        const dataStr = JSON.stringify(data);
        const compressedData = btoa(encodeURIComponent(dataStr));
        
        const message = `📊 *TRANSFER DATA LAPORAN - ${currentUser.name}*\n` +
                       `📅 Tanggal: ${new Date().toLocaleDateString('id')}\n` +
                       `📋 Divisi: ${currentUser.divisi}\n` +
                       `📝 Total Laporan: ${data.totalLaporan}\n\n` +
                       `*CARA IMPORT:*\n` +
                       `1. Login sebagai Admin\n` +
                       `2. Klik "📥 Import Data"\n` +
                       `3. Pilih "Paste dari Clipboard"\n` +
                       `4. Tempel kode di bawah ini\n\n` +
                       `*KODE DATA:*\n${compressedData}`;
        
        window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    function sendViaEmail() {
        const data = getExportData();
        const dataStr = JSON.stringify(data);
        const compressedData = btoa(encodeURIComponent(dataStr));
        
        let emailBody = `TRANSFER DATA LAPORAN HARIAN\n\n`;
        emailBody += `Operator: ${currentUser.name}\n`;
        emailBody += `Divisi: ${currentUser.divisi}\n`;
        emailBody += `Tanggal Export: ${new Date().toLocaleString('id')}\n`;
        emailBody += `Total Laporan: ${data.totalLaporan}\n\n`;
        emailBody += `KODE DATA:\n${compressedData}`;
        
        window.open(`mailto:?subject=Transfer%20Data%20Laporan%20${currentUser.name}&body=${encodeURIComponent(emailBody)}`, '_blank');
    }
    
    async function copyToClipboard() {
        const data = getExportData();
        const dataStr = JSON.stringify(data);
        const compressedData = btoa(encodeURIComponent(dataStr));
        
        try {
            await navigator.clipboard.writeText(compressedData);
            alert('✅ Data berhasil disalin ke clipboard!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = compressedData;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert('✅ Data berhasil disalin ke clipboard!');
        }
    }
    
    function generateTransferQR() {
        const data = getExportData();
        const dataStr = JSON.stringify(data);
        const compressedData = btoa(encodeURIComponent(dataStr));
        const qrText = `TRANSFER_DATA:${compressedData}`;
        
        const modalHtml = `
            <div id="transferModal" class="modal">
                <div class="modal-content qr-transfer-container">
                    <h3>📱 QR Code Transfer Data</h3>
                    <p>Scan QR Code ini dengan Admin untuk mentransfer data</p>
                    <p><strong>${currentUser.name}</strong> - ${currentUser.divisi}</p>
                    <p><small>📝 ${data.totalLaporan} laporan akan ditransfer</small></p>
                    <div id="transferQRCode" style="padding:20px;"></div>
                    <button onclick="closeTransferModal()" style="margin-top:10px; padding:8px 20px; background:#e74c3c; color:white; border:none; border-radius:8px;">Tutup</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        const img = document.createElement('img');

    // SCAN QR TRANSFER (Admin)
    async function startTransferScanner() {
        const modalHtml = `
            <div id="transferScanModal" class="modal">
                <div class="modal-content" style="max-width:400px;">
                    <h3>📷 Scan QR Transfer dari Operator</h3>
                    <p>Arahkan kamera ke QR Code yang ditampilkan operator</p>
                    <div id="transferPreview" style="width:100%; max-width:300px; margin:0 auto;"></div>
                    <div id="transferScanResult" style="margin-top:10px; font-size:12px; padding:10px;"></div>
                    <button onclick="closeTransferScanModal()" style="margin-top:15px; padding:8px 20px; background:#e74c3c; color:white; border:none; border-radius:8px;">Tutup</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        transferScanner = new Html5Qrcode("transferPreview");
        try {
            await transferScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (decodedText.startsWith('TRANSFER_DATA:')) {
                        const encodedData = decodedText.replace('TRANSFER_DATA:', '');
                        try {
                            const jsonData = decodeURIComponent(atob(encodedData));
                            const transferData = JSON.parse(jsonData);
                            
                            if (transferData.type === 'TRANSFER_DATA' && transferData.reports) {
                                let newCount = 0;
                                transferData.reports.forEach(newReport => {
                                    const exists = reports.some(r => r.id === newReport.id);
                                    if (!exists) {
                                        reports.push(newReport);
                                        newCount++;
                                    }
                                });
                                saveToLocal();
                                
                                document.getElementById('transferScanResult').innerHTML = `
                                    <div style="background:#d4edda; color:#155724; padding:10px; border-radius:8px;">
                                        ✅ BERHASIL! ${newCount} laporan diimport dari ${transferData.operatorName}
                                    </div>
                                `;
                                
                                setTimeout(() => {
                                    transferScanner.stop();
                                    closeTransferScanModal();
                                    renderAdminPanel();
                                }, 2000);
                            } else {
                                throw new Error("Format data tidak valid");
                            }
                        } catch (e) {
                            document.getElementById('transferScanResult').innerHTML = `
                                <div style="background:#f8d7da; color:#721c24; padding:10px; border-radius:8px;">
                                    ❌ Gagal membaca data: ${e.message}
                                </div>
                            `;
                        }
                    } else {
                        document.getElementById('transferScanResult').innerHTML = `
                            <div style="background:#fff3cd; color:#856404; padding:10px; border-radius:8px;">
                                ⚠️ Bukan QR Transfer yang valid
                            </div>
                        `;
                    }
                },
                () => {}
            );
        } catch (err) {
            document.getElementById('transferScanResult').innerHTML = `
                <div style="background:#f8d7da; color:#721c24; padding:10px; border-radius:8px;">
                    ❌ Gagal mengakses kamera: ${err}
                </div>
            `;
        }
    }

            transferScanner = null;
        }
        const modal = document.getElementById('transferScanModal');

    }

    async function processPastedData() {
        const pasteData = document.getElementById('importPasteData').value.trim();
        if (!pasteData) {
            alert('❌ Tidak ada data!');
            return;
        }
        try {
            const decodedData = decodeURIComponent(atob(pasteData));
            const importedData = JSON.parse(decodedData);
            if (importedData.type === 'TRANSFER_DATA' && importedData.reports) {
                let newCount = 0;
                importedData.reports.forEach(newReport => {
                    if (!reports.some(r => r.id === newReport.id)) {
                        reports.push(newReport);
                        newCount++;
                    }
                });
                saveToLocal();
                closeImportModal();
                alert(`✅ Import berhasil! ${newCount} laporan baru ditambahkan`);
                renderAdminPanel();
            } else {
                alert('❌ Format data tidak valid!');
            }
        } catch (err) {
            alert('❌ Gagal membaca data!');
        }
    }
    
    function importFromFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.type === 'TRANSFER_DATA' && importedData.reports) {
                    let newCount = 0;
                    importedData.reports.forEach(newReport => {
                        if (!reports.some(r => r.id === newReport.id)) {
                            reports.push(newReport);
                            newCount++;
                        }
                    });
                    saveToLocal();
                    closeImportModal();
                    alert(`✅ Import berhasil! ${newCount} laporan baru ditambahkan`);
                    renderAdminPanel();
                } else {
                    alert('❌ Format file tidak valid!');
                }
            } catch (err) {
                alert('❌ Gagal membaca file!');
            }
        };
        reader.readAsText(file);
    }
    
    // ==================== EXPORT XLSX ====================
    function exportAllToExcel() {
        const exportData = reports.map(r => ({
            'ID': r.id,
            'Tanggal': r.tanggal,
            'Operator': r.operatorName,
            'Divisi': r.divisi,
            'Aktivitas': r.aktivitas,
            'Jam Mulai': r.mulai,
            'Jam Selesai': r.selesai,
            'Total Jam': r.totalJam,
            'Status': r.status,
            'Catatan': r.catatan || ''
        }));
        
        if (exportData.length === 0) {
            alert('Belum ada data laporan!');
            return;
        }
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Daily Report');
        XLSX.writeFile(wb, `daily_report_all_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    function exportOperatorToExcel(operatorUsername) {
        const operatorData = operators.find(op => op.username === operatorUsername);
        const opReports = reports.filter(r => r.operator === operatorUsername);
        
        if (opReports.length === 0) {
            alert(`Tidak ada data untuk ${operatorData?.name || operatorUsername}`);
            return;
        }
        
        const exportData = opReports.map(r => ({
            'ID': r.id,
            'Tanggal': r.tanggal,
            'Aktivitas': r.aktivitas,
            'Jam Mulai': r.mulai,
            'Jam Selesai': r.selesai,
            'Total Jam': r.totalJam,
            'Status': r.status,
            'Catatan': r.catatan || ''
        }));
        
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `${operatorData?.name || operatorUsername}`);
        XLSX.writeFile(wb, `daily_report_${operatorData?.name || operatorUsername}_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    window.filterByDate = function(date) {
        currentDateFilter = date;
        renderOperatorPanel();
    };
    
    window.clearDateFilter = function() {
        currentDateFilter = '';
        renderOperatorPanel();
    };
    
    window.updateField = function(id, field, value) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report[field] = value;
            if (field === 'mulai' || field === 'selesai') {
                report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            }
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.updateTotalJamField = function(id) {
        const report = reports.find(r => r.id === id);
        if (report) {
            report.totalJam = calculateTotalJam(report.mulai, report.selesai);
            saveToLocal();
            renderOperatorPanel();
        }
    };
    
    window.addRowOperator = function() {
        const today = getTodayDate();
        const newId = reports.length > 0 ? Math.max(...reports.map(r => r.id)) + 1 : 1;
        const newRow = {
            id: newId,
            operator: currentUser.username,
            operatorName: currentUser.name,
            divisi: currentUser.divisi,
            tanggal: today,
            aktivitas: '',
            mulai: '',
            selesai: '',
            status: 'Pending',
            catatan: '',
            totalJam: '0.0',
            createdAt: new Date().toISOString()
        };
        reports.push(newRow);
        saveToLocal();
        
        if (currentDateFilter) currentDateFilter = '';
        renderOperatorPanel();
        
        setTimeout(() => {
            const rows = document.querySelectorAll('.spreadsheet-table tbody tr');
            if (rows.length > 0) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        
        alert(`✅ Baris baru untuk tanggal ${today} telah ditambahkan!`);
    };
    
    window.clearRow = function(rowId) {
        const report = reports.find(r => r.id === rowId);
        if (report && confirm(`Kosongkan semua kolom pada baris ini?`)) {
            report.aktivitas = '';
            report.mulai = '';
            report.selesai = '';
            report.catatan = '';
            report.totalJam = '0.0';
            report.status = 'Pending';
            saveToLocal();
            renderOperatorPanel();
            alert('Isi baris telah dikosongkan');
        }
    };
    
    window.deleteRow = function(rowId) {
        if (confirm(`Yakin ingin menghapus baris ini secara permanen?`)) {
            reports = reports.filter(r => r.id !== rowId);
            saveToLocal();
            renderOperatorPanel();
            alert('Baris telah dihapus');
        }
    };

    function handleLogin() {
        const roleBtn = document.querySelector('.role-btn.active');
        const role = roleBtn ? roleBtn.dataset.role : 'operator';
        const selectedValue = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!selectedValue) {
            document.getElementById('loginError').textContent = 'Pilih username!';
            return;
        }
        
        if (role === 'admin') {
            if (selectedValue === 'admin' && password === 'leader01') {
                currentUser = { username: 'admin', name: 'Administrator', role: 'admin', divisi: 'Admin' };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Username atau password admin salah!';
            }
        } else {
            const operator = operators.find(op => op.username === selectedValue);
            if (operator && operator.password === password) {
                currentUser = { username: operator.username, name: operator.name, role: 'operator', divisi: operator.divisi };
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'Password salah!';
            }
        }
    }
